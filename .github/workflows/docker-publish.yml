name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'chess-telegram-bot/docker/**'
      - 'chess-telegram-bot/umbrel-app.yml'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from umbrel-app.yml
        id: version
        run: |
          VERSION=$(grep '^version:' chess-telegram-bot/umbrel-app.yml | sed 's/version: "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./chess-telegram-bot/docker
          file: ./chess-telegram-bot/docker/Dockerfile
          push: true
          tags: |
            pitcentr/chess-telegram-bot:latest
            pitcentr/chess-telegram-bot:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo "Image pushed successfully!"
