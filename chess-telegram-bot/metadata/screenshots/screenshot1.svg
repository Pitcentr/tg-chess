<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <!-- Background -->
  <rect width="1280" height="800" fill="#0f0f1a"/>

  <!-- Phone frame -->
  <rect x="390" y="40" width="500" height="720" rx="40" fill="#1c1c2e" stroke="#333" stroke-width="2"/>
  <!-- Screen -->
  <rect x="405" y="70" width="470" height="660" rx="10" fill="#17212b"/>
  <!-- Notch -->
  <rect x="590" y="55" width="100" height="18" rx="9" fill="#111"/>

  <!-- Telegram header -->
  <rect x="405" y="70" width="470" height="56" rx="0" fill="#242f3d"/>
  <circle cx="440" cy="98" r="18" fill="#229ED9"/>
  <text x="440" y="104" font-family="Arial" font-size="16" fill="white" text-anchor="middle">♟</text>
  <text x="470" y="94" font-family="Arial" font-size="14" font-weight="bold" fill="white">Chess Bot</text>
  <text x="470" y="112" font-family="Arial" font-size="11" fill="#7d8e9e">online</text>

  <!-- Message bubble: bot -->
  <rect x="415" y="140" width="340" height="90" rx="12" fill="#182533"/>
  <text x="430" y="162" font-family="Arial" font-size="12" font-weight="bold" fill="#229ED9">Chess Bot</text>
  <text x="430" y="182" font-family="monospace" font-size="11" fill="#e0e0e0">♟ Новая игра создана!</text>
  <text x="430" y="200" font-family="monospace" font-size="11" fill="#aaa">Вы играете белыми ⬜</text>
  <text x="430" y="218" font-family="monospace" font-size="10" fill="#7d8e9e">ID: abc123xyz</text>

  <!-- Chessboard message -->
  <rect x="415" y="245" width="380" height="280" rx="12" fill="#182533"/>
  <text x="430" y="267" font-family="Arial" font-size="12" font-weight="bold" fill="#229ED9">Chess Bot</text>

  <!-- Mini ASCII board -->
  <text x="430" y="290" font-family="monospace" font-size="13" fill="#e0e0e0">  a b c d e f g h</text>
  <text x="430" y="308" font-family="monospace" font-size="13" fill="#e0e0e0">8 ♜ ♞ ♝ ♛ ♚ ♝ ♞ ♜ 8</text>
  <text x="430" y="326" font-family="monospace" font-size="13" fill="#e0e0e0">7 ♟ ♟ ♟ ♟ ♟ ♟ ♟ ♟ 7</text>
  <text x="430" y="344" font-family="monospace" font-size="13" fill="#aaa">6 · · · · · · · · 6</text>
  <text x="430" y="362" font-family="monospace" font-size="13" fill="#aaa">5 · · · · · · · · 5</text>
  <text x="430" y="380" font-family="monospace" font-size="13" fill="#aaa">4 · · · · ♙ · · · 4</text>
  <text x="430" y="398" font-family="monospace" font-size="13" fill="#aaa">3 · · · · · · · · 3</text>
  <text x="430" y="416" font-family="monospace" font-size="13" fill="#e0e0e0">2 ♙ ♙ ♙ ♙ · ♙ ♙ ♙ 2</text>
  <text x="430" y="434" font-family="monospace" font-size="13" fill="#e0e0e0">1 ♖ ♘ ♗ ♕ ♔ ♗ ♘ ♖ 1</text>
  <text x="430" y="452" font-family="monospace" font-size="13" fill="#e0e0e0">  a b c d e f g h</text>
  <text x="430" y="476" font-family="monospace" font-size="12" fill="#4fc3f7">🎯 Ваш ход! (⬛ чёрные)</text>
  <text x="430" y="496" font-family="monospace" font-size="10" fill="#7d8e9e">✅ Ход: e2e4</text>

  <!-- User message -->
  <rect x="530" y="540" width="260" height="36" rx="12" fill="#2b5278"/>
  <text x="660" y="563" font-family="monospace" font-size="13" fill="white" text-anchor="middle">/move e7e5</text>

  <!-- Bot reply -->
  <rect x="415" y="590" width="300" height="50" rx="12" fill="#182533"/>
  <text x="430" y="612" font-family="monospace" font-size="12" fill="#4caf50">✅ Ход: e7e5 (@player2)</text>
  <text x="430" y="630" font-family="monospace" font-size="11" fill="#aaa">⏳ Ждём хода соперника...</text>

  <!-- Input bar -->
  <rect x="405" y="700" width="470" height="30" rx="0" fill="#242f3d"/>
  <rect x="415" y="705" width="380" height="20" rx="10" fill="#17212b"/>
  <text x="430" y="719" font-family="Arial" font-size="11" fill="#7d8e9e">Сообщение...</text>

  <!-- Left side: feature list -->
  <text x="60" y="120" font-family="Arial" font-size="32" font-weight="bold" fill="white">Chess Bot</text>
  <text x="60" y="155" font-family="Arial" font-size="16" fill="#7d8e9e">for Umbrel + Telegram</text>

  <g font-family="Arial" font-size="15" fill="#e0e0e0">
    <text x="60" y="220">♟  Играйте в шахматы прямо</text>
    <text x="60" y="244">    в Telegram</text>
    <text x="60" y="284">⬜  Два игрока, очередь ходов</text>
    <text x="60" y="324">✅  Валидация всех ходов</text>
    <text x="60" y="364">📋  ASCII доска в чате</text>
    <text x="60" y="404">♚  Шах, мат, ничья, пат</text>
    <text x="60" y="444">🏳  Возможность сдаться</text>
    <text x="60" y="484">💾  Хранение в PocketBase</text>
    <text x="60" y="524">🔒  Полностью self-hosted</text>
  </g>

  <!-- Right side: commands -->
  <text x="920" y="120" font-family="Arial" font-size="20" font-weight="bold" fill="white">Команды</text>
  <g font-family="monospace" font-size="14">
    <rect x="910" y="135" width="310" height="36" rx="8" fill="#182533"/>
    <text x="925" y="158" fill="#4fc3f7">/newgame</text>
    <text x="1030" y="158" fill="#aaa">— создать игру</text>

    <rect x="910" y="180" width="310" height="36" rx="8" fill="#182533"/>
    <text x="925" y="203" fill="#4fc3f7">/join &lt;ID&gt;</text>
    <text x="1030" y="203" fill="#aaa">— войти в игру</text>

    <rect x="910" y="225" width="310" height="36" rx="8" fill="#182533"/>
    <text x="925" y="248" fill="#4fc3f7">/move e2e4</text>
    <text x="1040" y="248" fill="#aaa">— сделать ход</text>

    <rect x="910" y="270" width="310" height="36" rx="8" fill="#182533"/>
    <text x="925" y="293" fill="#4fc3f7">/board</text>
    <text x="1000" y="293" fill="#aaa">— показать доску</text>

    <rect x="910" y="315" width="310" height="36" rx="8" fill="#182533"/>
    <text x="925" y="338" fill="#4fc3f7">/resign</text>
    <text x="1000" y="338" fill="#aaa">— сдаться</text>

    <rect x="910" y="360" width="310" height="36" rx="8" fill="#182533"/>
    <text x="925" y="383" fill="#4fc3f7">/games</text>
    <text x="1000" y="383" fill="#aaa">— открытые игры</text>
  </g>

  <!-- Bottom badge -->
  <rect x="910" y="440" width="310" height="60" rx="12" fill="#1a3a1a"/>
  <text x="1065" y="466" font-family="Arial" font-size="13" fill="#4caf50" text-anchor="middle">✓ Self-hosted на Umbrel</text>
  <text x="1065" y="486" font-family="Arial" font-size="13" fill="#4caf50" text-anchor="middle">✓ Данные в PocketBase</text>
</svg>
