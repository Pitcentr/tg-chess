<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Vault Screenshot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .phone-frame {
            width: 375px;
            height: 667px;
            background: #0f0f0f;
            border-radius: 40px;
            padding: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        .screen {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #2a2a2a;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #333;
        }
        
        .bot-avatar {
            width: 40px;
            height: 40px;
            background: #00d26a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .bot-info h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }
        
        .bot-info p {
            color: #8e8e93;
            font-size: 13px;
        }
        
        .chat-area {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .message-out {
            background: #00d26a;
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message-in {
            background: #2a2a2a;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        
        .password-card {
            background: #2a2a2a;
            color: #fff;
            align-self: flex-start;
            border-radius: 12px;
            padding: 14px;
            max-width: 85%;
            border-bottom-left-radius: 4px;
        }
        
        .password-field {
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .password-label {
            color: #8e8e93;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .password-value {
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 15px;
        }
        
        .delete-button {
            background: #ff3b30;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }
        
        .input-area {
            background: #2a2a2a;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #333;
        }
        
        .input-field {
            flex: 1;
            background: #1a1a1a;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            color: #fff;
            font-size: 15px;
        }
        
        .send-button {
            width: 36px;
            height: 36px;
            background: #00d26a;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .lock-icon {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 30px;
            height: 30px;
            background: rgba(0, 210, 106, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00d26a;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="lock-icon">🔒</div>
        <div class="screen">
            <div class="header">
                <div class="bot-avatar">🔐</div>
                <div class="bot-info">
                    <h3>Telegram Vault</h3>
                    <p>Password Manager Bot</p>
                </div>
            </div>
            
            <div class="chat-area">
                <div class="message message-out">
                    github.com myuser SecurePass123!
                    <div class="message-time">14:23</div>
                </div>
                
                <div class="message message-in">
                    ✅ Saved
                    <div class="message-time">14:23</div>
                </div>
                
                <div class="message message-out">
                    github
                    <div class="message-time">14:25</div>
                </div>
                
                <div class="password-card">
                    <div class="password-field">
                        <div class="password-label">URL</div>
                        <div class="password-value">github.com</div>
                    </div>
                    <div class="password-field">
                        <div class="password-label">Login</div>
                        <div class="password-value">myuser</div>
                    </div>
                    <div class="password-field">
                        <div class="password-label">Password</div>
                        <div class="password-value">SecurePass123!</div>
                    </div>
                    <button class="delete-button">🗑️ Delete</button>
                    <div class="message-time">14:25 • Auto-delete in 2 min</div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" class="input-field" placeholder="Search or save password...">
                <button class="send-button">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M2 10L18 2L10 18L8 11L2 10Z" fill="white"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
