<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#1a1a2e"/>

  <!-- Chessboard (4x4 mini) -->
  <g transform="translate(10, 10)">
    <!-- Row 1 -->
    <rect x="0"  y="0"  width="20" height="20" fill="#f0d9b5"/>
    <rect x="20" y="0"  width="20" height="20" fill="#b58863"/>
    <rect x="40" y="0"  width="20" height="20" fill="#f0d9b5"/>
    <rect x="60" y="0"  width="20" height="20" fill="#b58863"/>
    <!-- Row 2 -->
    <rect x="0"  y="20" width="20" height="20" fill="#b58863"/>
    <rect x="20" y="20" width="20" height="20" fill="#f0d9b5"/>
    <rect x="40" y="20" width="20" height="20" fill="#b58863"/>
    <rect x="60" y="20" width="20" height="20" fill="#f0d9b5"/>
    <!-- Row 3 -->
    <rect x="0"  y="40" width="20" height="20" fill="#f0d9b5"/>
    <rect x="20" y="40" width="20" height="20" fill="#b58863"/>
    <rect x="40" y="40" width="20" height="20" fill="#f0d9b5"/>
    <rect x="60" y="40" width="20" height="20" fill="#b58863"/>
    <!-- Row 4 -->
    <rect x="0"  y="60" width="20" height="20" fill="#b58863"/>
    <rect x="20" y="60" width="20" height="20" fill="#f0d9b5"/>
    <rect x="40" y="60" width="20" height="20" fill="#b58863"/>
    <rect x="60" y="60" width="20" height="20" fill="#f0d9b5"/>
  </g>

  <!-- White King piece (center) -->
  <g transform="translate(50, 46)" fill="white" stroke="#333" stroke-width="1">
    <!-- Base -->
    <rect x="-9" y="6" width="18" height="4" rx="2"/>
    <!-- Body -->
    <rect x="-6" y="-2" width="12" height="9" rx="1"/>
    <!-- Cross vertical -->
    <rect x="-2" y="-10" width="4" height="12" rx="1"/>
    <!-- Cross horizontal -->
    <rect x="-6" y="-7" width="12" height="4" rx="1"/>
  </g>

  <!-- Telegram icon (bottom right badge) -->
  <circle cx="76" cy="76" r="16" fill="#229ED9"/>
  <path d="M68 76 l5 5 l10 -10" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
