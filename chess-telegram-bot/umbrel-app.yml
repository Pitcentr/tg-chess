manifestVersion: 1
id: chess-telegram-bot
name: Chess Telegram Bot
tagline: Play chess with friends via Telegram
icon: https://raw.githubusercontent.com/pitcentr/chess-telegram-bot/main/chess-telegram-bot/metadata/icon.svg
category: social
version: "1.0.16"
description: >-
  Telegram bot for playing chess with friends.


  Two players can play chess against each other directly in Telegram.
  Move validation, check/checkmate/draw detection, ASCII board display.


  Requires PocketBase app to be installed.


  After installation set TG_TOKEN, PB_ADMIN, PB_PASSWORD via app settings or SSH.
developer: pitcentr
website: https://github.com/pitcentr/chess-telegram-bot
submitter: pitcentr
submission: https://github.com/pitcentr/chess-telegram-bot
repo: https://github.com/pitcentr/chess-telegram-bot
support: https://github.com/pitcentr/chess-telegram-bot/issues
gallery:
  - https://raw.githubusercontent.com/pitcentr/chess-telegram-bot/main/chess-telegram-bot/metadata/screenshots/screenshot1.svg
releaseNotes: >-
  v1.0.16: DeepSeek AI position evaluation every 3rd move. Add DEEPSEEK_API_KEY env var.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
